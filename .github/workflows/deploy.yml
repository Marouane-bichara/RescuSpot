name: RescueSpot CI/CD Professional Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Caching dependencies makes subsequent runs much faster
          cache: maven

      - name: Compile and Run Tests
        # If any test fails here, the workflow stops and won't push to Docker Hub
        run: mvn clean test

      - name: Package Application
        # Now we package the JAR, skipping tests because they just passed above
        run: mvn package -DskipTests

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' # Don't push on PRs, only on Main push
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Using the naming convention from your example
          tags: ${{ secrets.DOCKER_USERNAME }}/rescuespot-app:latest, ${{ secrets.DOCKER_USERNAME }}/rescuespot-app:v1